<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kiosk Video Controls</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #888;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        #videoContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Remove Ubuntu accent styling */
        /* * {
            accent-color: #ccc;
        } */

        /* button,
        input[type="range"] {
            appearance: none;
            -webkit-appearance: none;
        } */

        /* ===== Controls ===== */
        #controls {
            position: absolute;
            bottom: 5%;
            left: 15%;
            width: 70%;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 5px;
        }

        /* Neutralize GTK button styling */
        #controls button {
            -webkit-appearance: none;
            appearance: none;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
            padding: 6px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* #controls button:focus,
        #controls button:active {
            background: transparent !important;
            outline: none !important;
            box-shadow: none !important;
        } */

        /* SVG icons */
        .icon {
            width: 28px;
            height: 28px;
            fill: white;
            pointer-events: none;
        }

        #progress {
            flex: 1;
        }

        /* ===== Custom Range Styling ===== */
        /* input[type="range"] {
            width: 99%;
            height: 6px;
            background: #444;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            background: #444;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #222;
            margin-top: -5px;
            cursor: pointer;
        } */
    </style>
</head>
<body>

<div id="videoContainer">
    <video id="video" autoplay loop playsinline>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div id="controls">

        <!-- Restart -->
        <button id="restart" aria-label="Restart">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M11 18V6l-8.5 6L11 18zm1-6 8.5 6V6L12 12z"/>
            </svg>
        </button>

        <!-- Rewind 10s -->
        <!-- <button id="rewind" aria-label="Rewind 10 seconds">
            <svg class="icon" viewBox="0 0 24 24">
                
            </svg>
        </button> --> 

        <!-- Play / Pause -->
        <button id="playPause" aria-label="Play / Pause">
            <svg class="icon" id="playIcon" viewBox="0 0 24 24">
                <!-- default pause -->
                <path id="playPath" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
        </button>

        <div id="progress">
            <input type="range" id="seek" min="0" max="100" value="0">
        </div>
    </div>
</div>

<script>
    const video = document.getElementById("video");
    const restartBtn = document.getElementById("restart");
    const playPauseBtn = document.getElementById("playPause");
    const playPath = document.getElementById("playPath");
    const seek = document.getElementById("seek");

    video.volume = 1.0;

    // Ensure autoplay
    window.addEventListener("load", () => {
        const promise = video.play();
        if (promise !== undefined) {
            promise.catch(() => {
                document.addEventListener("click", () => video.play(), { once: true });
            });
        }
    });

    // Restart
    restartBtn.addEventListener("click", () => {
        video.currentTime = 0;
    });

    // Play / Pause
    playPauseBtn.addEventListener("click", () => {
        if (video.paused) {
            video.play();
        } else {
            video.pause();
        }
    });

    video.addEventListener("play", () => {
        // pause icon
        playPath.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
    });

    video.addEventListener("pause", () => {
        // play icon
        playPath.setAttribute("d", "M8 5v14l11-7z");
    });

    // Update seek bar
    video.addEventListener("timeupdate", () => {
        if (video.duration) {
            const value = (video.currentTime / video.duration) * 100;
            seek.value = value;
        }
    });

    // Seek manually
    seek.addEventListener("input", () => {
        if (video.duration) {
            const time = (seek.value / 100) * video.duration;
            video.currentTime = time;
        }
    });
</script>

</body>
</html>
